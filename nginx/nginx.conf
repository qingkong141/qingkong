user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;

    client_max_body_size 2048m;

    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types        text/plain text/css text/xml
                      application/json application/javascript application/xml+rss
                      application/vnd.ms-fontobject application/x-font-ttf
                      font/opentype image/svg+xml image/x-icon;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    # ── 上游服务（docker-compose 内部 DNS） ─────────────────
    upstream qingkong_backend {
        server backend:8000;
        keepalive 32;
    }

    upstream qingkong_nuxt {
        server nuxt-blog:3000;
        keepalive 32;
    }

    upstream qingkong_minio {
        server minio:9000;
        keepalive 32;
    }

    server {
        listen       80 default_server;
        server_name  _;

        root /usr/share/nginx/html;

        # ── 安全响应头 ──────────────────────────────────────
        add_header X-Frame-Options            "SAMEORIGIN"            always;
        add_header X-Content-Type-Options     "nosniff"               always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

        # ── FastAPI 后端：/qingkong/* ──────────────────────
        location /qingkong/ {
            proxy_pass         http://qingkong_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
            proxy_request_buffering off;  # 支持大文件直接流转
        }

        # ── MinIO（可选代理，用于私有 bucket 下载签名 URL） ──
        location /minio/ {
            rewrite ^/minio/(.*)$ /$1 break;
            proxy_pass         http://qingkong_minio;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_buffering    off;
        }

        # ── 静态资源长缓存（对所有应用通用）─────────────────
        location ~* ^/(admin|blog-admin|drive)/assets/ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* ^/(admin|blog-admin|drive)/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|map)$ {
            try_files $uri =404;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            access_log off;
        }

        # ── qiankun 子应用：博客管理 ─────────────────────
        location /blog-admin/ {
            alias /usr/share/nginx/html/blog-admin/;
            try_files $uri $uri/ /blog-admin/index.html;
            add_header Cache-Control              "no-cache";
            # 跨域头确保 qiankun 主壳能 fetch 子应用 HTML
            add_header Access-Control-Allow-Origin  "*"            always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        }

        # ── qiankun 子应用：云盘 ────────────────────────
        location /drive/ {
            alias /usr/share/nginx/html/drive/;
            try_files $uri $uri/ /drive/index.html;
            add_header Cache-Control              "no-cache";
            add_header Access-Control-Allow-Origin  "*"            always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        }

        # ── 后台主壳 admin-shell（负责 /admin、/login、/s/:token）
        location /admin {
            try_files $uri $uri/ /admin/index.html;
            add_header Cache-Control "no-cache";
        }

        # admin-shell 的 SPA 路由（非 /admin 前缀）
        location = /login {
            try_files /admin/index.html =404;
            add_header Cache-Control "no-cache";
        }

        location /s/ {
            try_files /admin/index.html =404;
            add_header Cache-Control "no-cache";
        }

        # ── Nuxt 3 博客前台（SSR）─ 兜底所有其它路径 ─────
        location / {
            proxy_pass         http://qingkong_nuxt;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 60s;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
